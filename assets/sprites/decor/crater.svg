<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="craterGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#1a0f05"/>
      <stop offset="60%" stop-color="#3a2418"/>
      <stop offset="100%" stop-color="rgba(80,55,30,0)"/>
    </radialGradient>
    <radialGradient id="craterInner" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="100%" stop-color="#2a1808"/>
    </radialGradient>
  </defs>
  <!-- Outer scorch ring -->
  <ellipse cx="24" cy="26" rx="22" ry="18" fill="url(#craterGrad)" opacity="0.7"/>
  <!-- Debris ring (lighter brown chunks outside) -->
  <g fill="#6a4a28" opacity="0.7">
    <ellipse cx="8" cy="22" rx="2.5" ry="1"/>
    <ellipse cx="42" cy="28" rx="2" ry="1"/>
    <ellipse cx="24" cy="8" rx="2.2" ry="1"/>
    <ellipse cx="20" cy="44" rx="1.8" ry="0.9"/>
    <ellipse cx="38" cy="14" rx="1.5" ry="0.8"/>
    <ellipse cx="10" cy="34" rx="1.8" ry="0.9"/>
  </g>
  <!-- Main crater hole -->
  <ellipse cx="24" cy="24" rx="15" ry="12" fill="url(#craterInner)"/>
  <!-- Rim highlight -->
  <ellipse cx="24" cy="24" rx="15" ry="12" fill="none" stroke="#5a3a20" stroke-width="1" opacity="0.6"/>
  <!-- Radial cracks -->
  <g stroke="#2a1808" stroke-width="0.6" fill="none" opacity="0.8">
    <path d="M 24 12 L 25 8"/>
    <path d="M 36 20 L 42 20"/>
    <path d="M 34 30 L 40 32"/>
    <path d="M 18 36 L 17 42"/>
    <path d="M 10 26 L 5 28"/>
    <path d="M 14 14 L 10 10"/>
  </g>
  <!-- Inner shadow (deeper pit) -->
  <ellipse cx="22" cy="25" rx="8" ry="6" fill="#000" opacity="0.8"/>
</svg>
