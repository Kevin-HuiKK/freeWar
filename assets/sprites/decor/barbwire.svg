<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 24" width="64" height="24">
  <!-- Coiled wire stretched horizontally -->
  <g stroke="#8a8a90" stroke-width="1.2" fill="none" stroke-linecap="round">
    <!-- Main spiral strand -->
    <path d="M 2 12 Q 4 4 8 12 Q 12 20 16 12 Q 20 4 24 12 Q 28 20 32 12 Q 36 4 40 12 Q 44 20 48 12 Q 52 4 56 12 Q 60 20 62 12"/>
    <!-- Second strand (darker) -->
  </g>
  <g stroke="#5a5a60" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M 2 12 Q 4 20 8 12 Q 12 4 16 12 Q 20 20 24 12 Q 28 4 32 12 Q 36 20 40 12 Q 44 4 48 12 Q 52 20 56 12 Q 60 4 62 12"/>
  </g>
  <!-- Barbs / spikes (cross shapes at peaks) -->
  <g stroke="#6a6a70" stroke-width="0.8" fill="none" stroke-linecap="round">
    <path d="M 6 7 L 10 5 M 6 5 L 10 7"/>
    <path d="M 14 19 L 18 17 M 14 17 L 18 19"/>
    <path d="M 22 7 L 26 5 M 22 5 L 26 7"/>
    <path d="M 30 19 L 34 17 M 30 17 L 34 19"/>
    <path d="M 38 7 L 42 5 M 38 5 L 42 7"/>
    <path d="M 46 19 L 50 17 M 46 17 L 50 19"/>
    <path d="M 54 7 L 58 5 M 54 5 L 58 7"/>
  </g>
  <!-- Highlights on wire -->
  <g stroke="#d0d0d8" stroke-width="0.3" fill="none" stroke-linecap="round" opacity="0.6">
    <path d="M 2 12 Q 4 5 8 12"/>
    <path d="M 16 12 Q 20 5 24 12"/>
    <path d="M 32 12 Q 36 5 40 12"/>
    <path d="M 48 12 Q 52 5 56 12"/>
  </g>
</svg>
