<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" fill="#6b4f30"/>
  <!-- Dirt base variations -->
  <ellipse cx="15" cy="12" rx="10" ry="5" fill="#7a5e3e" opacity="0.6"/>
  <ellipse cx="45" cy="22" rx="12" ry="5" fill="#5a4024" opacity="0.5"/>
  <ellipse cx="25" cy="42" rx="14" ry="6" fill="#7a5e3e" opacity="0.5"/>
  <ellipse cx="52" cy="52" rx="10" ry="5" fill="#5a4024" opacity="0.55"/>
  <!-- Tire tracks (two parallel dark streaks) -->
  <rect x="18" y="0" width="4" height="64" fill="#4a3420" opacity="0.45"/>
  <rect x="42" y="0" width="4" height="64" fill="#4a3420" opacity="0.45"/>
  <!-- Cross impressions from tread -->
  <g fill="#3a2818" opacity="0.4">
    <rect x="18" y="4" width="4" height="1"/>
    <rect x="18" y="14" width="4" height="1"/>
    <rect x="18" y="24" width="4" height="1"/>
    <rect x="18" y="34" width="4" height="1"/>
    <rect x="18" y="44" width="4" height="1"/>
    <rect x="18" y="54" width="4" height="1"/>
    <rect x="42" y="8" width="4" height="1"/>
    <rect x="42" y="18" width="4" height="1"/>
    <rect x="42" y="28" width="4" height="1"/>
    <rect x="42" y="38" width="4" height="1"/>
    <rect x="42" y="48" width="4" height="1"/>
    <rect x="42" y="58" width="4" height="1"/>
  </g>
  <!-- Pebbles -->
  <circle cx="8" cy="28" r="1.5" fill="#8a7550"/>
  <circle cx="8.3" cy="28.2" r="1" fill="#a08a68" opacity="0.8"/>
  <circle cx="30" cy="18" r="1.2" fill="#6a5030"/>
  <circle cx="30.2" cy="17.9" r="0.7" fill="#8a7550" opacity="0.8"/>
  <circle cx="55" cy="38" r="1.8" fill="#8a7550"/>
  <circle cx="55.3" cy="38.2" r="1.2" fill="#a08a68" opacity="0.8"/>
  <circle cx="10" cy="58" r="1" fill="#6a5030"/>
  <circle cx="58" cy="8" r="0.9" fill="#6a5030"/>
  <circle cx="33" cy="56" r="1.3" fill="#8a7550"/>
  <!-- Cracks / ruts -->
  <path d="M 5 45 Q 15 48 25 45" fill="none" stroke="#3a2818" stroke-width="0.5" opacity="0.5"/>
  <path d="M 38 8 Q 45 12 55 10" fill="none" stroke="#3a2818" stroke-width="0.5" opacity="0.5"/>
</svg>
