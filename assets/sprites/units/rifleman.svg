<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="rShadow" cx="0.5" cy="0.6" r="0.5">
      <stop offset="0%" stop-color="rgba(0,0,0,0.35)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <ellipse cx="24" cy="40" rx="14" ry="4" fill="url(#rShadow)"/>
  <!-- M4 rifle body -->
  <rect x="26" y="22.5" width="14" height="3" fill="#1e1e1e"/>
  <rect x="40" y="23" width="4" height="2" fill="#2a2a2a"/>
  <rect x="38" y="21" width="2" height="2" fill="#2a2a2a"/>
  <!-- Magazine -->
  <rect x="28" y="25" width="3" height="4" fill="#1a1a1a"/>
  <!-- Rifle stock -->
  <rect x="22" y="22" width="6" height="4" fill="#2a2a2a" rx="0.5"/>
  <!-- Torso (tactical vest olive green) -->
  <ellipse cx="24" cy="26" rx="10" ry="8" fill="#3e4d28"/>
  <path d="M 14 26 Q 14 20 24 20 Q 34 20 34 26" fill="#4d5d32"/>
  <!-- Vest pouches -->
  <rect x="17" y="23" width="3" height="4" fill="#2e3a1d" rx="0.5"/>
  <rect x="21" y="23" width="3" height="4" fill="#2e3a1d" rx="0.5"/>
  <rect x="25" y="23" width="3" height="4" fill="#2e3a1d" rx="0.5"/>
  <!-- Shoulder patches -->
  <rect x="14" y="22" width="3" height="3" fill="#3e4d28"/>
  <rect x="31" y="22" width="3" height="3" fill="#3e4d28"/>
  <!-- Head -->
  <circle cx="24" cy="16" r="6" fill="#c49c74"/>
  <!-- Kevlar helmet -->
  <path d="M 17.5 14 Q 17.5 8 24 8 Q 30.5 8 30.5 14 L 31 16 L 17 16 Z" fill="#3a4a22"/>
  <!-- Helmet detail (strap + camo spots) -->
  <ellipse cx="20" cy="12" rx="1.5" ry="1" fill="#2a3818"/>
  <ellipse cx="26" cy="10" rx="1.2" ry="0.8" fill="#2a3818"/>
  <ellipse cx="28" cy="13" rx="1" ry="0.7" fill="#2a3818"/>
  <line x1="18" y1="16" x2="30" y2="16" stroke="#2a3818" stroke-width="0.8"/>
  <!-- Eye guard -->
  <rect x="20" y="15" width="8" height="1.2" fill="#1a1a1a"/>
</svg>
