<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="apcBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a5d32"/>
      <stop offset="50%" stop-color="#3a4d24"/>
      <stop offset="100%" stop-color="#2a3a18"/>
    </linearGradient>
    <radialGradient id="apcShadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(0,0,0,0.4)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <ellipse cx="24" cy="42" rx="18" ry="3" fill="url(#apcShadow)"/>
  <!-- Left track -->
  <rect x="4" y="12" width="6" height="28" fill="#1a1f15" rx="1"/>
  <line x1="4.5" y1="15" x2="9.5" y2="15" stroke="#3a3a3a" stroke-width="0.5"/>
  <line x1="4.5" y1="19" x2="9.5" y2="19" stroke="#3a3a3a" stroke-width="0.5"/>
  <line x1="4.5" y1="23" x2="9.5" y2="23" stroke="#3a3a3a" stroke-width="0.5"/>
  <line x1="4.5" y1="27" x2="9.5" y2="27" stroke="#3a3a3a" stroke-width="0.5"/>
  <line x1="4.5" y1="31" x2="9.5" y2="31" stroke="#3a3a3a" stroke-width="0.5"/>
  <line x1="4.5" y1="35" x2="9.5" y2="35" stroke="#3a3a3a" stroke-width="0.5"/>
  <!-- Right track -->
  <rect x="38" y="12" width="6" height="28" fill="#1a1f15" rx="1"/>
  <line x1="38.5" y1="15" x2="43.5" y2="15" stroke="#3a3a3a" stroke-width="0.5"/>
  <line x1="38.5" y1="19" x2="43.5" y2="19" stroke="#3a3a3a" stroke-width="0.5"/>
  <line x1="38.5" y1="23" x2="43.5" y2="23" stroke="#3a3a3a" stroke-width="0.5"/>
  <line x1="38.5" y1="27" x2="43.5" y2="27" stroke="#3a3a3a" stroke-width="0.5"/>
  <line x1="38.5" y1="31" x2="43.5" y2="31" stroke="#3a3a3a" stroke-width="0.5"/>
  <line x1="38.5" y1="35" x2="43.5" y2="35" stroke="#3a3a3a" stroke-width="0.5"/>
  <!-- Hull -->
  <rect x="9" y="10" width="30" height="30" fill="url(#apcBody)" rx="2"/>
  <!-- Hull camo patches -->
  <ellipse cx="14" cy="16" rx="3" ry="2" fill="#5a6f3a" opacity="0.5"/>
  <ellipse cx="32" cy="22" rx="2.5" ry="1.8" fill="#5a6f3a" opacity="0.5"/>
  <ellipse cx="20" cy="30" rx="3" ry="2" fill="#2a3818" opacity="0.6"/>
  <!-- Armor plates -->
  <line x1="9" y1="20" x2="39" y2="20" stroke="#1a2010" stroke-width="0.5"/>
  <line x1="9" y1="30" x2="39" y2="30" stroke="#1a2010" stroke-width="0.5"/>
  <!-- Turret -->
  <circle cx="24" cy="24" r="7" fill="#3a4d24"/>
  <circle cx="24" cy="24" r="7" fill="none" stroke="#1a2010" stroke-width="0.8"/>
  <!-- Turret hatch -->
  <circle cx="24" cy="24" r="3" fill="#2a3818"/>
  <circle cx="24" cy="24" r="1.2" fill="#1a2010"/>
  <!-- Cannon (pointing right/up) -->
  <rect x="30" y="23.3" width="14" height="1.4" fill="#1a1a1a"/>
  <rect x="42" y="23.1" width="2" height="1.8" fill="#2a2a2a"/>
  <!-- Front slope highlight -->
  <path d="M 9 10 L 15 10 L 13 14 L 9 14 Z" fill="#6a8040" opacity="0.4"/>
</svg>
