<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>freeWar — le'o 的塔防</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="iceberg-scene">
    <h1>freeWar</h1>
    <p class="subtitle">le'o 的塔防 · 选择难度</p>
    <div id="iceberg">
      <div class="water-line"></div>
      <div class="layer" data-layer="1" data-unlocked="true" style="top: 4%;">
        <span class="layer-name">希望层</span>
        <span class="layer-tag">第 1 层</span>
      </div>
      <div class="layer" data-layer="2" style="top: 18%;"><span class="layer-name">浅层</span><span class="layer-tag">第 2 层</span></div>
      <div class="layer" data-layer="3" style="top: 28%;"><span class="layer-name">中层</span><span class="layer-tag">第 3 层</span></div>
      <div class="layer" data-layer="4" style="top: 38%;"><span class="layer-name">下层</span><span class="layer-tag">第 4 层</span></div>
      <div class="layer" data-layer="5" style="top: 48%;"><span class="layer-name">深层</span><span class="layer-tag">第 5 层</span></div>
      <div class="layer" data-layer="6" style="top: 58%;"><span class="layer-name">黑层</span><span class="layer-tag">第 6 层</span></div>
      <div class="layer" data-layer="7" style="top: 68%;"><span class="layer-name">近渊层</span><span class="layer-tag">第 7 层</span></div>
      <div class="layer" data-layer="8" style="top: 78%;"><span class="layer-name">暗层</span><span class="layer-tag">第 8 层</span></div>
      <div class="layer" data-layer="9" style="top: 88%;"><span class="layer-name">深渊层</span><span class="layer-tag">第 9 层</span></div>
    </div>
    <p class="hint">点击"希望层"开始游戏（其他层待解锁）</p>

    <div id="meta-panel">
      <div class="meta-wallet">
        <span class="hud-icon">💰</span>
        <span class="meta-label">钱包</span>
        <span id="meta-wallet">0</span>
      </div>
      <div class="meta-actions">
        <a class="meta-btn casino-btn" href="gambling/scratch-lottery/index.html">🎰 进赌场（刮彩票）</a>
        <a class="meta-btn casino-btn" href="V3/index.html" style="background:linear-gradient(180deg,#4ea0ff,#2a78dd)">🌊 V3 红线群岛战争</a>
        <button class="meta-btn bonus-btn" id="buy-bonus-gold" type="button">
          买永久 <b>+50</b> 起始金币（<span id="bonus-price">$30</span>）
        </button>
      </div>
      <div class="meta-info">
        <span>永久起始金币加成：<b>+<span id="meta-bonus">0</span></b></span>
        <span>战绩：胜 <b id="meta-wins">0</b> · 败 <b id="meta-losses">0</b></span>
      </div>
    </div>
  </div>

  <div id="level-scene" hidden>
    <div id="stage">
      <div id="battle-pane">
        <div id="hud">
          <div class="hud-cell"><span class="hud-icon">💰</span><span id="hud-gold">0</span></div>
          <div class="hud-cell"><span class="hud-icon">❤️</span><span id="hud-base">0/0</span></div>
          <div class="hud-cell hud-wave">
            <span class="hud-icon">🌊</span>
            <span id="hud-wave-label">1/5</span>
            <div class="hud-wave-bar"><div id="hud-wave-fill"></div></div>
          </div>
          <div class="hud-cell"><span class="hud-icon">🏔️</span><span id="hud-level">—</span></div>
          <button id="hud-mute" type="button" aria-label="静音">🔊</button>
        </div>
        <div id="canvas-wrap">
          <canvas id="game" width="640" height="384"></canvas>
          <div id="toast" hidden></div>
        </div>
      </div>
      <aside id="menu">
        <div class="menu-title">放置单位</div>
      </aside>
    </div>
    <div id="end-overlay" hidden>
      <div class="end-card">
        <div id="end-text"></div>
        <div id="end-reward" class="end-reward"></div>
        <button id="back-to-iceberg" type="button">返回冰山</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
