<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 900" width="2400" height="900" preserveAspectRatio="none">
  <defs>
    <linearGradient id="smog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a332a"/>
      <stop offset="0.6" stop-color="#201c17"/>
      <stop offset="1" stop-color="#0e0c08"/>
    </linearGradient>
    <linearGradient id="zone-ally" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(74,138,199,0.18)"/>
      <stop offset="1" stop-color="rgba(74,138,199,0)"/>
    </linearGradient>
    <linearGradient id="zone-enemy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(225,74,58,0)"/>
      <stop offset="1" stop-color="rgba(225,74,58,0.18)"/>
    </linearGradient>
    <radialGradient id="vign" cx="0.5" cy="0.5" r="0.85">
      <stop offset="0" stop-color="rgba(0,0,0,0)"/>
      <stop offset="1" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>
    <radialGradient id="fire" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffb040" stop-opacity="0.85"/>
      <stop offset="0.6" stop-color="#c04010" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#ff6020" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
    <pattern id="concrete" width="96" height="96" patternUnits="userSpaceOnUse">
      <rect width="96" height="96" fill="#38342e"/>
      <rect width="96" height="96" fill="#2f2b26" opacity="0.5"/>
      <polygon points="0,0 48,0 42,14 0,20" fill="#3e3a32" opacity="0.6"/>
      <polygon points="96,0 96,32 68,28 74,0" fill="#42382e" opacity="0.5"/>
      <polygon points="0,96 30,88 36,74 0,70" fill="#2a2620" opacity="0.7"/>
      <polygon points="96,96 60,88 68,72 96,66" fill="#342e27" opacity="0.6"/>
      <path d="M20 10 L40 8 L52 24 L35 40 L18 32 Z" fill="none" stroke="#1e1a14" stroke-width="0.6" opacity="0.7"/>
      <circle cx="18" cy="48" r="1.2" fill="#5a5044"/>
      <circle cx="70" cy="28" r="1" fill="#5a5044"/>
      <circle cx="44" cy="68" r="1.4" fill="#4a4036"/>
      <circle cx="88" cy="80" r="0.9" fill="#5a5044"/>
    </pattern>
    <pattern id="asphalt" width="128" height="96" patternUnits="userSpaceOnUse">
      <rect width="128" height="96" fill="#1c1a18"/>
      <rect width="128" height="96" fill="#26221e" opacity="0.7"/>
      <rect x="0" y="46" width="28" height="3" fill="#8a7a3a" opacity="0.4"/>
      <rect x="38" y="46" width="28" height="3" fill="#8a7a3a" opacity="0.35"/>
      <rect x="76" y="46" width="28" height="3" fill="#8a7a3a" opacity="0.3"/>
      <path d="M0 20 Q30 24 64 18 Q98 12 128 22" stroke="#0a0908" stroke-width="0.8" fill="none" opacity="0.8"/>
      <path d="M0 74 Q40 68 64 76 Q90 86 128 72" stroke="#0a0908" stroke-width="0.7" fill="none" opacity="0.7"/>
      <ellipse cx="50" cy="28" rx="14" ry="5" fill="#0a0806" opacity="0.6"/>
      <ellipse cx="100" cy="62" rx="12" ry="4" fill="#0a0806" opacity="0.55"/>
    </pattern>
    <pattern id="rubble" width="48" height="48" patternUnits="userSpaceOnUse">
      <rect width="48" height="48" fill="#3a3830"/>
      <polygon points="4,18 16,10 22,22 10,28" fill="#5a554a"/>
      <polygon points="16,10 22,22 32,18 28,6" fill="#4a453c"/>
      <polygon points="22,22 32,18 38,32 24,38" fill="#6a6458"/>
      <polygon points="32,18 38,32 44,22 40,8" fill="#4e483e"/>
      <line x1="14" y1="20" x2="10" y2="4" stroke="#2a2520" stroke-width="1"/>
      <line x1="30" y1="22" x2="34" y2="6" stroke="#2a2520" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Sky / smog -->
  <rect width="2400" height="140" fill="url(#smog)"/>
  <g fill="#0a0806" opacity="0.88">
    <rect x="40"  y="70" width="60" height="70"/>
    <rect x="104" y="85" width="50" height="55"/>
    <rect x="160" y="50" width="12" height="90"/>
    <polygon points="160,50 166,40 172,50"/>
    <rect x="210" y="80" width="80" height="60"/>
    <rect x="290" y="60" width="14" height="80"/>
    <polygon points="290,60 297,48 304,60"/>
    <rect x="340" y="90" width="100" height="50"/>
    <rect x="460" y="70" width="60" height="70"/>
    <rect x="540" y="85" width="120" height="55"/>
    <rect x="680" y="55" width="16" height="85"/>
    <rect x="730" y="80" width="100" height="60"/>
    <rect x="850" y="70" width="60" height="70"/>
    <rect x="930" y="90" width="110" height="50"/>
    <rect x="1060" y="60" width="18" height="80"/>
    <polygon points="1060,60 1069,46 1078,60"/>
    <rect x="1100" y="80" width="140" height="60"/>
    <rect x="1260" y="70" width="70" height="70"/>
    <rect x="1350" y="85" width="100" height="55"/>
    <rect x="1470" y="55" width="14" height="85"/>
    <rect x="1510" y="80" width="120" height="60"/>
    <rect x="1650" y="65" width="80" height="75"/>
    <rect x="1750" y="90" width="110" height="50"/>
    <rect x="1880" y="50" width="16" height="90"/>
    <polygon points="1880,50 1888,38 1896,50"/>
    <rect x="1910" y="80" width="100" height="60"/>
    <rect x="2030" y="70" width="90" height="70"/>
    <rect x="2140" y="85" width="120" height="55"/>
    <rect x="2280" y="70" width="80" height="70"/>
  </g>
  <g fill="#3a332a" opacity="0.45" filter="url(#blur2)">
    <ellipse cx="166" cy="30" rx="25" ry="18"/>
    <ellipse cx="297" cy="24" rx="35" ry="22"/>
    <ellipse cx="1069" cy="20" rx="40" ry="24"/>
    <ellipse cx="1888" cy="18" rx="45" ry="26"/>
  </g>

  <!-- Ground + asphalt paths following the waypoint route -->
  <rect x="0" y="140" width="2400" height="760" fill="url(#concrete)"/>
  <rect x="0"    y="410" width="560"  height="90"  fill="url(#asphalt)"/>
  <rect x="470"  y="260" width="110"  height="260" fill="url(#asphalt)"/>
  <rect x="470"  y="260" width="420"  height="90"  fill="url(#asphalt)"/>
  <rect x="800"  y="260" width="110"  height="340" fill="url(#asphalt)"/>
  <rect x="800"  y="540" width="420"  height="90"  fill="url(#asphalt)"/>
  <rect x="1130" y="340" width="110"  height="290" fill="url(#asphalt)"/>
  <rect x="1130" y="340" width="500"  height="90"  fill="url(#asphalt)"/>
  <rect x="1540" y="340" width="110"  height="300" fill="url(#asphalt)"/>
  <rect x="1540" y="550" width="420"  height="90"  fill="url(#asphalt)"/>
  <rect x="1870" y="410" width="110"  height="230" fill="url(#asphalt)"/>
  <rect x="1870" y="410" width="530"  height="90"  fill="url(#asphalt)"/>

  <!-- Zone shading -->
  <rect x="0"    y="140" width="400" height="760" fill="url(#zone-ally)"/>
  <rect x="2000" y="140" width="400" height="760" fill="url(#zone-enemy)"/>

  <!-- Rubble pile obstacle -->
  <g transform="translate(665, 450)">
    <ellipse cx="0" cy="60" rx="130" ry="12" fill="#000" opacity="0.5"/>
    <rect x="-110" y="-60" width="220" height="120" fill="url(#rubble)" opacity="0.95"/>
    <polygon points="-110,30 -80,-40 -30,-20 10,-50 60,-10 100,-30 110,60 -110,60" fill="#2a2420" opacity="0.85"/>
    <polygon points="-60,-20 -40,-35 -30,-15 -50,0" fill="#5a544a"/>
    <polygon points="20,-30 50,-55 70,-30 45,-10" fill="#4a4438"/>
    <line x1="-45" y1="-15" x2="-48" y2="-50" stroke="#2a2520" stroke-width="2"/>
    <line x1="40" y1="-30" x2="35" y2="-60" stroke="#2a2520" stroke-width="2"/>
  </g>

  <!-- Wrecked office building -->
  <g transform="translate(1000, 410)">
    <rect x="-100" y="-240" width="200" height="240" fill="#2a2824" stroke="#1a1815"/>
    <polygon points="-100,-240 -30,-240 -40,-180 -100,-170" fill="#1a1a18"/>
    <polygon points="40,-240 100,-240 100,-210 60,-200" fill="#1a1a18"/>
    <g fill="#6a6050" opacity="0.6">
      <rect x="-86" y="-220" width="20" height="28"/><rect x="-60" y="-220" width="20" height="28"/>
      <rect x="-30" y="-220" width="20" height="28"/><rect x="0" y="-220" width="20" height="28"/>
      <rect x="30"  y="-220" width="20" height="28"/><rect x="60" y="-220" width="20" height="28"/>
      <rect x="-86" y="-180" width="20" height="28"/>
      <rect x="-60" y="-180" width="20" height="28" fill="#ffb040" opacity="0.4"/>
      <rect x="-30" y="-180" width="20" height="28"/><rect x="0" y="-180" width="20" height="28"/>
      <rect x="30"  y="-180" width="20" height="28" fill="#ffb040" opacity="0.3"/>
      <rect x="60" y="-180" width="20" height="28"/>
      <rect x="-86" y="-140" width="20" height="28"/><rect x="-60" y="-140" width="20" height="28"/>
      <rect x="-30" y="-140" width="20" height="28"/><rect x="0" y="-140" width="20" height="28"/>
      <rect x="30"  y="-140" width="20" height="28"/><rect x="60" y="-140" width="20" height="28"/>
      <rect x="-86" y="-100" width="20" height="28"/><rect x="-60" y="-100" width="20" height="28"/>
      <rect x="-30" y="-100" width="20" height="28"/><rect x="0" y="-100" width="20" height="28"/>
      <rect x="30"  y="-100" width="20" height="28"/><rect x="60" y="-100" width="20" height="28"/>
      <rect x="-86" y="-60"  width="20" height="28"/><rect x="-60" y="-60"  width="20" height="28"/>
      <rect x="-30" y="-60"  width="20" height="28"/><rect x="0"   y="-60"  width="20" height="28"/>
      <rect x="30"  y="-60"  width="20" height="28"/><rect x="60"  y="-60"  width="20" height="28"/>
    </g>
    <polygon points="-20,0 -20,-40 20,-40 20,0" fill="#000"/>
    <ellipse cx="0" cy="-5" rx="40" ry="6" fill="#000" opacity="0.6"/>
    <text x="-75" y="-40" font-family="Courier, monospace" font-size="14" fill="#e14a3a" opacity="0.6" transform="rotate(-8, -75, -40)">KEEP OUT</text>
  </g>

  <!-- Collapsed warehouse (lower) -->
  <g transform="translate(1000, 680)">
    <rect x="-100" y="-80" width="200" height="160" fill="#332e28" stroke="#1a1815"/>
    <polygon points="-100,-80 100,-80 60,-50 -70,-40" fill="#1a1815"/>
    <line x1="-60" y1="-68" x2="-40" y2="-20" stroke="#1a1815" stroke-width="3"/>
    <line x1="30"  y1="-58" x2="50"  y2="10" stroke="#1a1815" stroke-width="3"/>
    <rect x="-60" y="20" width="40" height="50" fill="#000"/>
    <rect x="0"   y="20" width="40" height="50" fill="#000"/>
  </g>

  <!-- Shipping containers -->
  <g transform="translate(1370, 490)">
    <ellipse cx="0" cy="90" rx="130" ry="10" fill="#000" opacity="0.5"/>
    <rect x="-120" y="-20" width="100" height="60" fill="#6a2a1e" stroke="#2a1008" stroke-width="2"/>
    <rect x="-20"  y="-20" width="100" height="60" fill="#5a8aac" stroke="#2a4a6c" stroke-width="2"/>
    <rect x="80"   y="-20" width="40"  height="60" fill="#4a6a2a" stroke="#1a2a0a" stroke-width="2"/>
    <rect x="-100" y="-80" width="100" height="60" fill="#6a5020" stroke="#2a1a08" stroke-width="2"/>
    <rect x="0"    y="-80" width="100" height="60" fill="#4a2a1a" stroke="#1a0806" stroke-width="2"/>
    <text x="-85" y="22" font-family="monospace" font-size="11" font-weight="700" fill="#d4a43a">TEU-0742</text>
    <text x="15"  y="22" font-family="monospace" font-size="11" font-weight="700" fill="#f3ead0">MRK-1138</text>
  </g>

  <!-- Crane + power pylon -->
  <g transform="translate(1780, 400)">
    <rect x="-35" y="160" width="70" height="24" fill="#1a1a18"/>
    <g stroke="#5a5044" stroke-width="2" fill="none">
      <line x1="-20" y1="160" x2="-14" y2="-180"/>
      <line x1="20"  y1="160" x2="14"  y2="-180"/>
      <line x1="-20" y1="160" x2="14"  y2="-180"/>
      <line x1="20"  y1="160" x2="-14" y2="-180"/>
      <line x1="-18" y1="120" x2="18" y2="120"/>
      <line x1="-16" y1="40"  x2="16" y2="40"/>
      <line x1="-14" y1="-40" x2="14" y2="-40"/>
      <line x1="-14" y1="-120" x2="14" y2="-120"/>
    </g>
    <rect x="-14" y="-190" width="180" height="14" fill="#3a3430" stroke="#1a1a18"/>
    <rect x="-60" y="-186" width="46"  height="10" fill="#3a3430"/>
    <line x1="120" y1="-176" x2="120" y2="-60" stroke="#1a1a18" stroke-width="1.5"/>
    <polygon points="112,-60 128,-60 124,-48 116,-48" fill="#2a2a28"/>
    <circle cx="0" cy="-196" r="4" fill="#e14a3a"/>
  </g>

  <!-- Wrecked tank + fire -->
  <g transform="translate(2110, 580)">
    <ellipse cx="0" cy="30" rx="60" ry="8" fill="#000" opacity="0.55"/>
    <rect x="-50" y="-20" width="100" height="40" rx="3" fill="#3a3a30" stroke="#1a1a18"/>
    <circle cx="0" cy="0" r="16" fill="#2a2a22"/>
    <rect x="12" y="-2" width="70" height="4" fill="#1a1a18" transform="rotate(-10, 12, 0)"/>
    <circle cx="-20" cy="-8" r="14" fill="url(#fire)"/>
    <circle cx="20"  cy="-12" r="10" fill="url(#fire)"/>
    <ellipse cx="0" cy="-50" rx="35" ry="20" fill="#3a332a" opacity="0.5" filter="url(#blur2)"/>
  </g>

  <!-- Burning oil barrels -->
  <g transform="translate(380, 680)">
    <ellipse cx="0" cy="18" rx="14" ry="4" fill="#000" opacity="0.6"/>
    <rect x="-12" y="-20" width="24" height="38" fill="#5a3020" stroke="#2a1008"/>
    <circle cx="0" cy="-30" r="14" fill="url(#fire)"/>
  </g>
  <g transform="translate(850, 740)">
    <ellipse cx="0" cy="18" rx="14" ry="4" fill="#000" opacity="0.6"/>
    <rect x="-12" y="-20" width="24" height="38" fill="#5a3020" stroke="#2a1008"/>
    <circle cx="0" cy="-30" r="14" fill="url(#fire)"/>
  </g>
  <g transform="translate(1480, 240)">
    <ellipse cx="0" cy="18" rx="14" ry="4" fill="#000" opacity="0.6"/>
    <rect x="-12" y="-20" width="24" height="38" fill="#5a3020" stroke="#2a1008"/>
    <circle cx="0" cy="-30" r="14" fill="url(#fire)"/>
  </g>

  <!-- Vignette -->
  <rect width="2400" height="900" fill="url(#vign)"/>
</svg>
